[variables]
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["bun"]

[phases.install]
cmds = [
  "bun install --frozen-lockfile"
]

[phases.build]
cmds = [
  "echo \"DATABASE_URL=$DATABASE_URL\" > apps/server/.env",
  "bun run db:generate",
  "bun run db:deploy",
  "cd apps/server && bun run compile",
  "rm -rf node_modules apps/*/node_modules packages/*/node_modules || true"
]

[start]
cmd="/app/apps/server/server"